{% extends "base.html" %}
{% load static %}

{% block title %}Home | Karki Dai Bakery{% endblock %}

{% block extra_css %}
<!-- Import custom CSS for this page -->
<link rel="stylesheet" type="text/css" href="{% static 'css/login.css' %}">
{% endblock %}

{% block content %}

<h2>Login</h2>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Login</button>
</form>

<p>No account?
<a href="{% url 'signup' %}">Signup</a></p>

{% endblock %}
